name: Main Branch Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  id-token: write
  packages: write

env:
  GH_USERNAME: ${{ github.event.head_commit.author.name }}
  GH_EMAIL: ${{ github.event.head_commit.author.email }}
  GH_REPO_URL: https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/goabonga/test0.git
  PYTHON_DEFAULT_VERSION: "3.11"
  POETRY_VERSION: "2.1.1"

jobs:

  # ============================================
  # Check if this is a release commit
  # ============================================
  check-release-commit:
    name: Check Release Commit
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      is_stable: ${{ steps.check.outputs.is_stable }}
    steps:
      - name: 🔍 Check commit message
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" =~ ^chore\(release\): ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            if [[ "$COMMIT_MSG" =~ stable ]]; then
              echo "is_stable=true" >> $GITHUB_OUTPUT
              echo "Stable release detected: will bump major version"
            else
              echo "is_stable=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "Skipping: commit does not match 'chore(release): ...'"
          fi

  # ============================================
  # Wait for CI to pass
  # ============================================
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    needs: [check-release-commit]
    if: needs.check-release-commit.outputs.is_release == 'true'
    permissions:
      actions: read
    steps:
      - name: ⏳ Wait for CI workflow to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for CI workflow on commit ${{ github.sha }}..."
          TIMEOUT=1800
          INTERVAL=15
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/tests.yml/runs?head_sha=${{ github.sha }}&per_page=1" --jq '.workflow_runs[0].id // empty')

            if [ -n "$RUN_ID" ]; then
              STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq '.status')
              CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq '.conclusion // empty')

              echo "CI run $RUN_ID: status=$STATUS conclusion=$CONCLUSION (${ELAPSED}s elapsed)"

              if [ "$STATUS" = "completed" ]; then
                if [ "$CONCLUSION" = "success" ]; then
                  echo "CI workflow completed successfully!"
                  exit 0
                else
                  echo "CI workflow failed with conclusion: $CONCLUSION"
                  exit 1
                fi
              fi
            else
              echo "CI workflow not found yet (${ELAPSED}s elapsed)"
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timeout waiting for CI workflow"
          exit 1

  # ============================================
  # Bump version and build package
  # ============================================
  bump_and_build:
    name: Bump version and build package
    runs-on: ubuntu-latest
    needs: [check-release-commit, wait-for-ci]
    if: needs.check-release-commit.outputs.is_release == 'true'
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔑 Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: 🔓 Unlock GPG key
        run: |
          echo "test" | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --pinentry-mode loopback -s >/dev/null
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔧 Configure Git user
        run: |
          git config --global user.name "${{ env.GH_USERNAME }}"
          git config --global user.email "${{ env.GH_EMAIL }}"
          git config --global user.signingkey "$(gpg --list-secret-keys --keyid-format=LONG | grep sec | awk '{print $2}' | cut -d/ -f2)"
          git config --global commit.gpgsign true
          git config --global tag.gpgSign true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: 🛠️ Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: 📦 Install dependencies
        run: poetry install --with dev --extras server --extras worker

      - name: 🔍 Check for releasable commits
        id: check
        run: |
          if poetry run cz bump --dry-run 2>&1 | grep -q "No commits found"; then
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_commits=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: 🚀 Bump version with Commitizen
        if: steps.check.outputs.has_commits == 'true'
        id: bump
        run: |
          IS_STABLE="${{ needs.check-release-commit.outputs.is_stable }}"
          if [ "$IS_STABLE" = "true" ]; then
            echo "Stable release: bumping major version"
            poetry run cz bump --increment MAJOR --yes --changelog
          else
            poetry run cz bump --yes --changelog
          fi
          echo "version=$(poetry version -s)" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true

      - name: 🧱 Build distribution
        if: steps.bump.outputs.version != ''
        run: poetry build

      - name: ✂️ Extract latest changelog section
        if: steps.bump.outputs.version != ''
        run: |
          awk '/^## /{i++} i==1' CHANGELOG.md > LATEST_CHANGELOG.md

      - name: 📤 Push version bump and tag
        if: steps.bump.outputs.version != ''
        run: |
          git remote set-url origin ${{ env.GH_REPO_URL }}
          git push origin HEAD
          git push origin --tags

      - name: 📤 Upload build artifacts
        if: steps.bump.outputs.version != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            dist/*
            LATEST_CHANGELOG.md

  # ============================================
  # Create GitHub Release
  # ============================================
  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: bump_and_build
    if: needs.bump_and_build.outputs.version != ''
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-files
          path: .

      - name: 🚀 Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump_and_build.outputs.version }}
          name: Release v${{ needs.bump_and_build.outputs.version }}
          body_path: LATEST_CHANGELOG.md
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  # ============================================
  # Deploy MkDocs
  # ============================================
  deploy_docs:
    name: Deploy MkDocs
    runs-on: ubuntu-latest
    needs:
      - github_release
      - bump_and_build
    if: needs.bump_and_build.outputs.version != ''
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
            ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: 🛠️ Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: 📦 Install dependencies
        run: poetry install --with dev --with docs --extras server --extras worker

      - name: 🔑 Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: 🔓 Unlock GPG key
        run: |
          echo "test" | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --pinentry-mode loopback -s >/dev/null
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔧 Configure Git user
        run: |
          git config --global user.name "${{ env.GH_USERNAME }}"
          git config --global user.email "${{ env.GH_EMAIL }}"
          git config --global user.signingkey "$(gpg --list-secret-keys --keyid-format=LONG | grep sec | awk '{print $2}' | cut -d/ -f2)"
          git config --global commit.gpgsign true
          git config --global tag.gpgSign true

      - name: 🏗️ Build docs with MkDocs
        run: poetry run mkdocs build

      - name: 📂 Prepare gh-pages branch
        run: |
          if git ls-remote --exit-code --heads ${{ env.GH_REPO_URL }} gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages ${{ env.GH_REPO_URL }} gh-pages
            rm -rf gh-pages/*
          else
            mkdir gh-pages
            cd gh-pages
            git init
            git checkout --orphan gh-pages
          fi

      - name: 📄 Copy docs
        run: |
          cp -r site/* gh-pages/
          touch gh-pages/.nojekyll

      - name: ✅ Commit & push signed docs
        run: |
          cd gh-pages
          git add .
          git commit -S -m "docs: publish docs for v${{ needs.bump_and_build.outputs.version }}"
          git remote remove origin 2>/dev/null || true
          git remote add origin ${{ env.GH_REPO_URL }}
          git push origin gh-pages

  # ============================================
  # Publish CLI to PyPI
  # ============================================
  publish_pypi:
    name: Publish CLI to PyPI
    runs-on: ubuntu-latest
    needs:
      - github_release
      - bump_and_build
    if: needs.bump_and_build.outputs.version != ''
    environment:
      name: pypi
      url: https://pypi.org/p/test0001
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-files
          path: .

      - name: 📦 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ============================================
  # Publish Docker Image to GHCR
  # ============================================
  publish_docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - github_release
      - bump_and_build
    if: needs.bump_and_build.outputs.version != ''
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump_and_build.outputs.version }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/goabonga/test0-server:${{ needs.bump_and_build.outputs.version }}
            ghcr.io/goabonga/test0-server:latest
          labels: |
            org.opencontainers.image.source=https://github.com/goabonga/test0
            org.opencontainers.image.version=${{ needs.bump_and_build.outputs.version }}
            org.opencontainers.image.title=test0-server
            org.opencontainers.image.description=OIDC/OAuth2 authentication service - FastAPI server

      - name: 🐳 Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/goabonga/test0-worker:${{ needs.bump_and_build.outputs.version }}
            ghcr.io/goabonga/test0-worker:latest
          labels: |
            org.opencontainers.image.source=https://github.com/goabonga/test0
            org.opencontainers.image.version=${{ needs.bump_and_build.outputs.version }}
            org.opencontainers.image.title=test0-worker
            org.opencontainers.image.description=OIDC/OAuth2 authentication service - Celery worker

  # ============================================
  # Publish Helm Chart to GHCR (OCI)
  # ============================================
  publish_helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs:
      - github_release
      - bump_and_build
    if: needs.bump_and_build.outputs.version != ''
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump_and_build.outputs.version }}

      - name: 🔧 Install Helm
        uses: azure/setup-helm@v4

      - name: 🔑 Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 📦 Package Helm chart
        run: helm package chart/shomer

      - name: 📤 Push Helm chart to GHCR
        run: helm push shomer-${{ needs.bump_and_build.outputs.version }}.tgz oci://ghcr.io/goabonga/test0-chart
