services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - SHOMER_DATABASE_URL=postgresql+asyncpg://shomer:shomer@postgres:5432/shomer
      - SHOMER_CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readiness')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - SHOMER_CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A shomer.worker beat --loglevel=info
    environment:
      - SHOMER_CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    command: alembic upgrade head
    environment:
      - PYTHONPATH=/app/src
      - SHOMER_DATABASE_URL=postgresql+asyncpg://shomer:shomer@postgres:5432/shomer
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=shomer
      - POSTGRES_PASSWORD=shomer
      - POSTGRES_DB=shomer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shomer"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
