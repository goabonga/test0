{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shomer.fullname" . }}-postgres
  labels:
    {{- include "shomer.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "shomer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
